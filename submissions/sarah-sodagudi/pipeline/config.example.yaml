# Copy this file to config.yaml and fill in real values.
# config.yaml is gitignored -- never commit real credentials.
# Secrets (API token, DB password) do NOT go here -- see .env.example.

api:
  base_url: "https://eodhd.com/api/fundamentals"
  max_retries: 5
  backoff_seconds: 2
  http_timeout_seconds: 30

# Read-only connection to the shared PostgreSQL instance that hosts the
# `companies` table (primary source of the active S&P 500 ticker
# universe). This pipeline never writes to this database. Credentials
# (user/password) come from .env, not here.
postgres:
  host: "localhost"
  port: 5433
  database: "financial_data"
  companies_table: "companies"

# Where fundamentals get written. No auth configured here since the
# target MongoDB instance runs without auth in local/dev use -- add
# user/password fields (sourced from .env, same pattern as postgres)
# if your target instance requires it.
mongo:
  host: "localhost"
  port: 27017
  database: "financial_db"
  annual_collection: "annual_fundamental"
  quarter_collection: "quarter_fundamental"

paths:
  # Fallback ticker universe if the Postgres companies table is
  # unreachable or has zero active rows -- CSV is NOT committed to this
  # repo (data policy), point this at wherever your own copy lives.
  sp500_constituents_csv: "./sp500_union_constituents.csv"
  checkpoint_file: "./data/.checkpoint.json"

run:
  # 0 = no limit (full active universe). Set to a small number (e.g. 3)
  # for a cheap first test run -- each ticker costs 10 EODHD API
  # requests (confirmed empirically, not the usual 1/call weight).
  ticker_limit: 0
